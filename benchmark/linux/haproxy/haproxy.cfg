global
  maxconn 20000
  log stdout format raw local0
  nbthread 4

defaults
  mode    http
  timeout connect 2s
  timeout client  60s
  timeout server  35s
  option  forwardfor
  option  http-server-close
  option  log-health-checks
  log     global

# ---------------------------------------------------------------------------
# Stats endpoint — acessível em http://haproxy:9090/stats;csv para coleta
# ---------------------------------------------------------------------------
frontend stats
  bind *:9090
  stats enable
  stats uri /stats
  stats refresh 2s
  stats show-legends
  stats show-node

# ---------------------------------------------------------------------------
# Frontend principal — distribui entre Poseidon e Horse (round-robin desativado;
# cada cenário direciona para apenas um backend via ACL de porta)
# ---------------------------------------------------------------------------
frontend http_in
  bind *:8081   # → Poseidon
  bind *:8082   # → Horse/CrossSocket
  use_backend poseidon_backend if { dst_port 8081 }
  use_backend horse_backend    if { dst_port 8082 }

# ---------------------------------------------------------------------------
# Backend Poseidon
# rise 2 = 2 checks OK consecutivos para marcar UP
# fall 2 = 2 checks falhos para marcar DOWN
# inter 1s = intervalo de healthcheck
# ---------------------------------------------------------------------------
backend poseidon_backend
  balance roundrobin
  option httpchk GET /ping HTTP/1.1\r\nHost:\ poseidon
  http-check expect status 200
  default-server inter 1s rise 2 fall 2
  server poseidon poseidon:8080 check

# ---------------------------------------------------------------------------
# Backend Horse/CrossSocket
# ---------------------------------------------------------------------------
backend horse_backend
  balance roundrobin
  option httpchk GET /ping HTTP/1.1\r\nHost:\ horse
  http-check expect status 200
  default-server inter 1s rise 2 fall 2
  server horse horse:8080 check
